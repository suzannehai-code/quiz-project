<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style 1: Playful & Colorful</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffd1ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .label {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 6px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(252, 182, 159, 0.4);
      text-align: center;
    }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    .progress {
      display: flex; gap: 6px; justify-content: center; margin-bottom: 28px;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; background: #ffecd2;
    }
    .dot.active { background: #fcb69f; }
    h2 {
      font-size: 22px; font-weight: 800; color: #333;
      margin-bottom: 28px; line-height: 1.4;
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      padding: 16px 20px;
      border-radius: 16px;
      border: 3px solid #ffecd2;
      background: #fffaf8;
      font-size: 16px; font-weight: 600; color: #555;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .option:hover { border-color: #fcb69f; background: #fff5f0; color: #333; transform: translateY(-2px); }
    .option.selected { border-color: #fcb69f; background: #fff0e8; color: #e8744a; }
  </style>
</head>
<body>
  <div class="label">STYLE 1 — PLAYFUL & COLORFUL</div>
  <div class="card">
    <div class="emoji">☕</div>
    <div class="progress">
      <div class="dot active"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <h2>It's Friday night. What are you doing?</h2>
    <div class="options">
      <div class="option">🎉 Hosting a dinner party for all my friends</div>
      <div class="option">📚 Reading with a cozy blanket and tea</div>
      <div class="option selected">🌙 Working late — there's always more to do</div>
      <div class="option">🍫 Treating myself to dessert and a movie</div>
    </div>
  </div>
</body>
</html>
