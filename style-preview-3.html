<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style 3: Bold & Dramatic</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .label {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #fff; color: #000; padding: 6px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
    }
    .card {
      max-width: 540px;
      width: 100%;
    }
    .meta {
      font-size: 12px; font-weight: 500; color: #555;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px;
    }
    .progress {
      display: flex; gap: 4px; margin-bottom: 40px;
    }
    .seg {
      height: 3px; flex: 1; background: #222; border-radius: 2px;
    }
    .seg.done { background: #e8ff47; }
    h2 {
      font-size: 28px; font-weight: 700; color: #fff;
      margin-bottom: 36px; line-height: 1.3; letter-spacing: -0.5px;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      padding: 18px 22px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #111;
      font-size: 15px; font-weight: 500; color: #888;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .option:hover { border-color: #e8ff47; color: #fff; }
    .option.selected { border-color: #e8ff47; color: #fff; background: #141400; }
    .arrow { font-size: 18px; opacity: 0; }
    .option.selected .arrow { opacity: 1; color: #e8ff47; }
    .next {
      margin-top: 28px;
      padding: 16px 32px;
      background: #e8ff47; color: #0a0a0a;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="label">STYLE 3 — BOLD & DRAMATIC</div>
  <div class="card">
    <div class="meta">2 / 5</div>
    <div class="progress">
      <div class="seg done"></div>
      <div class="seg done"></div>
      <div class="seg"></div>
      <div class="seg"></div>
      <div class="seg"></div>
    </div>
    <h2>It's Friday night.<br>What are you doing?</h2>
    <div class="options">
      <div class="option"><span>Hosting a dinner party for all my friends</span><span class="arrow">→</span></div>
      <div class="option"><span>Reading with a cozy blanket and tea</span><span class="arrow">→</span></div>
      <div class="option selected"><span>Working late — there's always more to do</span><span class="arrow">→</span></div>
      <div class="option"><span>Treating myself to dessert and a movie</span><span class="arrow">→</span></div>
    </div>
    <button class="next">Next Question</button>
  </div>
</body>
</html>
